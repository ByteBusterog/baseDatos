<!DOCTYPE html>
<html lang="es" class="light dark">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">

  <title>Agregar - Base de Datos</title>

  <meta name="viewport" content="width=device-width">
  <meta name="theme-color" content="#fffbfe">
  <link rel="icon" sizes="32x32" href="favicon.ico">
  <link rel="manifest" href="site.webmanifest">
  <script src="ungap/custom-elements.js"></script>

  <script type="module" src="js/configura.js"></script>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="css/transicion_pestanas.css">
  <link rel="expect" blocking="render" href="#navtabfixed">
  <script type="module" src="lib/js/submitForm.js"></script>
  <script type="module" src="lib/js/muestraError.js"></script>

</head>

<body style="padding-bottom: 5rem;">

  <md-top-app-bar adicional="tab" headline="headline"
    style="display: flex; align-items: center; justify-content: space-between;">
    <div style="display: flex; align-items: center;">
      <button type="button" class="md-standard-icon-button" title="Cancelar"
        onclick="window.location.href='index.html';" style="margin-right: 10px;">
        <span class="material-symbols-outlined">cancel</span>
      </button>
      <h1 style="margin: 0;">Agregar estudiante</h1>
    </div>

    <button type="button" class="md-standard-icon-button" title="Guardar" slot="action"
      onclick="document.querySelector('.md-filled-button[type=submit]').click()">
      <span class="material-symbols-outlined">save</span>
    </button>
  </md-top-app-bar>

  <h1 id="headline">Agregar estudiante</h1>
  <nav-tab-fixed id="tab"></nav-tab-fixed>
  <main>
    <form onsubmit="submitForm('srv/estudiante-agrega.php', event)
    .then(modelo => location.href = 'index.html')
    .catch(muestraError)">
      <p>
        <label class="md-filled-text-field">
          <input id="nombre" name="nombre" required placeholder="Nombre*">
          <span>Nombre *</span>
          <small>Obligatorio</small>
        </label>
      </p>


      <p>
        <label class="md-filled-text-field">
          <input id="cuatrimestre" name="cuatrimestre" required placeholder="Cuatrimestre*">
          <span>Cuatrimestre *</span>
          <small>Obligatorio</small>
        </label>
      </p>

      <p>
        <label class="md-filled-text-field">
          <input id="carrera" name="carrera" required placeholder="Carrera*">
          <span>Carrera *</span>
          <small>Obligatorio</small>
        </label>
      </p>
      <button class="md-filled-button" type="submit" style="display: none;">
        Agregar
      </button>

    </form>
  </main>
</body>

</html>
